  <rect x="268" y="55" width="10" height="8" rx="1" fill="url(#g1)" opacity="0.25"/>
  <rect x="284" y="55" width="10" height="8" rx="1" fill="url(#g1)" opacity="0.25"/>
  <rect x="300" y="55" width="10" height="8" rx="1" fill="url(#g1)" opacity="0.25"/>
  <rect x="316" y="55" width="10" height="8" rx="1" fill="url(#g1)" opacity="0.25"/>
