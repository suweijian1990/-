    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.75" transform="rotate(0)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.65" transform="rotate(72)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.55" transform="rotate(144)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.65" transform="rotate(216)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.75" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5" fill="#F43F5E" opacity="0.8"/>
    <circle cx="0" cy="0" r="2.5" fill="#8B5CF6"/>
  </g>
  <path d="M55 55 Q53 65 55 80 Q57 90 55 100" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M53 70 Q43 64 37 68 Q45 74 53 70" fill="#10B981" opacity="0.4"/>
