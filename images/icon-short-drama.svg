  <g transform="translate(180,18) scale(0.55)">
    <ellipse cx="0" cy="-14" rx="4" ry="11" fill="url(#flower)" opacity="0.6" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="4" ry="11" fill="url(#flower)" opacity="0.5" transform="rotate(72)"/>
    <ellipse cx="0" cy="-14" rx="4" ry="11" fill="url(#flower)" opacity="0.4" transform="rotate(144)"/>
    <ellipse cx="0" cy="-14" rx="4" ry="11" fill="url(#flower)" opacity="0.5" transform="rotate(216)"/>
    <ellipse cx="0" cy="-14" rx="4" ry="11" fill="url(#flower)" opacity="0.6" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#F43F5E" opacity="0.7"/>
    <circle cx="0" cy="0" r="2" fill="#8B5CF6"/>
  </g>
  <!-- Badges -->
  <rect x="115" y="172" width="40" height="16" rx="8" stroke="url(#g1)" stroke-width="1" fill="url(#g2)"/>
  <text x="135" y="183.5" font-family="'Space Grotesk',sans-serif" font-size="7.5" fill="#8B5CF6" text-anchor="middle" font-weight="600">AIGC</text>
  <rect x="205" y="172" width="45" height="16" rx="8" stroke="#F43F5E" stroke-width="1" fill="none" opacity="0.45"/>
  <text x="227.5" y="183.5" font-family="'Noto Sans SC',sans-serif" font-size="7.5" fill="#F43F5E" text-anchor="middle" opacity="0.65">待上映</text>
  <!-- Particles -->
  <circle cx="25" cy="30" r="2" fill="#F43F5E" opacity="0.25"/>
  <circle cx="340" cy="28" r="2" fill="#8B5CF6" opacity="0.25"/>
  <circle cx="30" cy="140" r="1.5" fill="#3B82F6" opacity="0.2"/>
  <circle cx="335" cy="135" r="1.5" fill="#F43F5E" opacity="0.2"/>
  <circle cx="180" cy="100" r="145" stroke="url(#g1)" stroke-width="0.3" fill="none" opacity="0.06" stroke-dasharray="8,12"/>
