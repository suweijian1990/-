<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/><stop offset="50%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="flower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E"/><stop offset="50%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.08"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="gl" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F43F5E" stop-opacity="0.1"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="180" cy="80" r="140" fill="url(#gl)"/>
  <!-- Film clapperboard (center) -->
  <rect x="100" y="85" width="160" height="80" rx="6" fill="url(#g2)" stroke="url(#g1)" stroke-width="2"/>
  <line x1="100" y1="102" x2="260" y2="102" stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="119" x2="260" y2="119" stroke="url(#g1)" stroke-width="0.5" opacity="0.15"/>
  <!-- Clapper top (open) -->
  <path d="M100 85 L105 52 L265 35 L260 85 Z" fill="url(#g2)" stroke="url(#g1)" stroke-width="2"/>
  <line x1="118" y1="80" x2="125" y2="50" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>
  <line x1="145" y1="80" x2="152" y2="46" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>
  <line x1="172" y1="80" x2="179" y2="43" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>
  <line x1="199" y1="80" x2="206" y2="40" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>
  <line x1="226" y1="80" x2="233" y2="37" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>
  <circle cx="105" cy="85" r="4" fill="url(#g1)" opacity="0.6"/>
  <!-- Text on board -->
  <text x="120" y="115" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#8B5CF6" opacity="0.6" font-weight="600">SCENE 01</text>
  <text x="195" y="115" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#3B82F6" opacity="0.6" font-weight="600">TAKE 01</text>
  <text x="120" y="135" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#06B6D4" opacity="0.45">刺桐花开</text>
  <text x="195" y="135" font-family="'Space Grotesk',sans-serif" font-size="8" fill="#8B5CF6" opacity="0.45">2026</text>
  <!-- Erythrina flowers (left side) -->
