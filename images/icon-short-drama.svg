  <g transform="translate(305,50) scale(0.8)">
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.7" transform="rotate(15)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.6" transform="rotate(87)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.5" transform="rotate(159)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.6" transform="rotate(231)"/>
    <ellipse cx="0" cy="-16" rx="5" ry="13" fill="url(#flower)" opacity="0.7" transform="rotate(303)"/>
    <circle cx="0" cy="0" r="5" fill="#F43F5E" opacity="0.8"/>
    <circle cx="0" cy="0" r="2.5" fill="#8B5CF6"/>
  </g>
  <path d="M305 60 Q307 72 305 90 Q303 100 305 110" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.45"/>
  <path d="M307 78 Q317 72 323 76 Q315 82 307 78" fill="#10B981" opacity="0.35"/>
