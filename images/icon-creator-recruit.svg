  <circle cx="55" cy="35" r="8" fill="#F59E0B" opacity="0.25"/>
  <circle cx="305" cy="40" r="8" fill="#8B5CF6" opacity="0.25"/>
  <circle cx="60" cy="135" r="8" fill="#3B82F6" opacity="0.25"/>
  <circle cx="300" cy="130" r="8" fill="#06B6D4" opacity="0.25"/>
  <circle cx="180" cy="155" r="8" fill="#F59E0B" opacity="0.25"/>
  <!-- Connection lines -->
  <line x1="165" y1="55" x2="63" y2="38" stroke="#F59E0B" stroke-width="1" opacity="0.25"/>
  <line x1="195" y1="55" x2="297" y2="43" stroke="#8B5CF6" stroke-width="1" opacity="0.25"/>
  <line x1="165" y1="88" x2="68" y2="130" stroke="#3B82F6" stroke-width="1" opacity="0.25"/>
  <line x1="195" y1="88" x2="292" y2="127" stroke="#06B6D4" stroke-width="1" opacity="0.25"/>
  <line x1="180" y1="92" x2="180" y2="147" stroke="#F59E0B" stroke-width="1" opacity="0.25"/>
