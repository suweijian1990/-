  <line x1="55" y1="35" x2="305" y2="40" stroke="url(#g1)" stroke-width="0.4" opacity="0.12" stroke-dasharray="5,5"/>
  <line x1="60" y1="135" x2="300" y2="130" stroke="url(#g1)" stroke-width="0.4" opacity="0.12" stroke-dasharray="5,5"/>
