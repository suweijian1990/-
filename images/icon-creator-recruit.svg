  <circle cx="65" cy="82" r="10" stroke="url(#g1)" stroke-width="1" fill="none" opacity="0.45"/>
  <circle cx="65" cy="82" r="4" fill="#F59E0B" opacity="0.45"/>
  <rect x="53" y="61" width="16" height="6" rx="2" fill="url(#g1)" opacity="0.35"/>
