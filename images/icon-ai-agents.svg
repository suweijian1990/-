<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/><stop offset="50%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/><stop offset="100%" stop-color="#3B82F6" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/><stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="180" cy="90" r="130" fill="url(#gl)"/>
  <!-- Central AI brain -->
  <circle cx="180" cy="90" r="28" stroke="url(#g1)" stroke-width="2" fill="url(#g2)"/>
  <path d="M168 78 Q180 70 192 78" stroke="url(#g1)" stroke-width="1.5" fill="none"/>
  <circle cx="180" cy="82" r="3" fill="#8B5CF6" opacity="0.6"/>
  <line x1="180" y1="82" x2="180" y2="100" stroke="url(#g1)" stroke-width="1" opacity="0.35"/>
  <!-- 6 agent nodes spread horizontally -->
  <!-- Node 1: far left -->
  <circle cx="40" cy="60" r="18" stroke="url(#g1)" stroke-width="1.5" fill="url(#g2)"/>
  <text x="40" y="65" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#8B5CF6" text-anchor="middle" font-weight="600">对话</text>
  <!-- Node 2: left -->
  <circle cx="110" cy="40" r="18" stroke="url(#g1)" stroke-width="1.5" fill="url(#g2)"/>
  <text x="110" y="45" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle" font-weight="600">文案</text>
  <!-- Node 3: center-top -->
  <circle cx="180" cy="28" r="14" stroke="url(#g1)" stroke-width="1" fill="url(#g2)"/>
  <text x="180" y="33" font-family="'Noto Sans SC',sans-serif" font-size="8" fill="#06B6D4" text-anchor="middle">判断</text>
  <!-- Node 4: right -->
  <circle cx="250" cy="40" r="18" stroke="url(#g1)" stroke-width="1.5" fill="url(#g2)"/>
  <text x="250" y="45" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#10B981" text-anchor="middle" font-weight="600">模板</text>
  <!-- Node 5: far right -->
  <circle cx="320" cy="60" r="18" stroke="url(#g1)" stroke-width="1.5" fill="url(#g2)"/>
  <text x="320" y="65" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle" font-weight="600">解锁</text>
  <!-- Node 6: bottom center -->
  <circle cx="180" cy="155" r="18" stroke="url(#g1)" stroke-width="1.5" fill="url(#g2)"/>
  <text x="180" y="160" font-family="'Noto Sans SC',sans-serif" font-size="10" fill="#8B5CF6" text-anchor="middle" font-weight="600">执行</text>
  <!-- Connection lines from brain to nodes -->
  <line x1="155" y1="80" x2="58" y2="62" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="163" y1="68" x2="120" y2="48" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="180" y1="62" x2="180" y2="42" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="197" y1="68" x2="240" y2="48" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="205" y1="80" x2="302" y2="62" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
  <line x1="180" y1="118" x2="180" y2="137" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
  <!-- Pulse dots -->
  <circle cx="106" cy="70" r="2" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="140" cy="55" r="2" fill="#3B82F6" opacity="0.5"/>
  <circle cx="180" cy="52" r="2" fill="#06B6D4" opacity="0.5"/>
  <circle cx="220" cy="55" r="2" fill="#10B981" opacity="0.5"/>
  <circle cx="254" cy="70" r="2" fill="#3B82F6" opacity="0.5"/>
  <circle cx="180" cy="128" r="2" fill="#8B5CF6" opacity="0.5"/>
  <!-- Hexagon outline -->
  <polygon points="40,60 110,40 250,40 320,60 180,155 180,155" stroke="url(#g1)" stroke-width="0.4" fill="none" opacity="0.1" stroke-dasharray="5,5"/>
  <!-- Particles -->
  <circle cx="20" cy="120" r="2" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="340" cy="120" r="2" fill="#06B6D4" opacity="0.2"/>
  <circle cx="180" cy="180" r="140" stroke="url(#g1)" stroke-width="0.3" fill="none" opacity="0.06" stroke-dasharray="8,12"/>
</svg>
