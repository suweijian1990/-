<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡片测试</title>
<style>
:root {
  --bg: #06060E; --bg-card: #0E0E1C;
  --border: rgba(255,255,255,0.06);
  --violet: #8B5CF6;
  --radius: 20px; --radius-sm: 12px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --font-cn: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-en: 'Space Grotesk', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-cn); background: #111; color: #fff; padding: 40px; }

h2 { margin-bottom: 20px; color: var(--violet); }
.row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }

/* 方案1: background-image */
.card-bg {
  width: 400px; min-height: 280px; position: relative; border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  background-color: #000;
}
.card-bg .bg {
  position: absolute; inset: 0; z-index: 0;
  background-size: cover; background-position: center;
}
.card-bg .overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, rgba(6,6,14,0.2) 0%, rgba(6,6,14,0.5) 50%, rgba(6,6,14,0.85) 100%);
  border-radius: var(--radius);
}
.card-bg .txt { position: absolute; left: 0; bottom: 0; right: 0; z-index: 2; padding: 20px 24px; }
.card-bg .txt h3 { font-size: 15px; margin-bottom: 2px; }
.card-bg .txt .en { font-family: var(--font-en); font-size: 9px; text-transform: uppercase; color: rgba(255,255,255,0.5); }

/* 方案2: img + object-fit */
.card-img {
  width: 400px; min-height: 280px; position: relative; border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  background-color: #000;
}
.card-img img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0; display: block;
}
.card-img .overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(180deg, rgba(6,6,14,0.2) 0%, rgba(6,6,14,0.5) 50%, rgba(6,6,14,0.85) 100%);
  border-radius: var(--radius);
}
.card-img .txt { position: absolute; left: 0; bottom: 0; right: 0; z-index: 2; padding: 20px 24px; }
.card-img .txt h3 { font-size: 15px; margin-bottom: 2px; }
.card-img .txt .en { font-family: var(--font-en); font-size: 9px; text-transform: uppercase; color: rgba(255,255,255,0.5); }

.label { font-size: 12px; color: #888; margin-bottom: 8px; }
</style>
</head>
<body>
<h2>方案1: background-image cover</h2>
<div class="row">
  <div>
    <div class="label">MINISO (800x450)</div>
    <div class="card-bg">
      <div class="bg" style="background-image:url(uploads/images/case-miniso.gif)"></div>
      <div class="overlay"></div>
      <div class="txt"><h3>名创优品 · 年会AI开场视频</h3><div class="en">MINISO Annual Gala</div></div>
    </div>
  </div>
  <div>
    <div class="label">Peugeot (800x450)</div>
    <div class="card-bg">
      <div class="bg" style="background-image:url(uploads/images/case-peugeot.gif)"></div>
      <div class="overlay"></div>
      <div class="txt"><h3>东风标致 · AI传播视频</h3><div class="en">Peugeot AI Brand Film</div></div>
    </div>
  </div>
</div>

<h2>方案2: img + object-fit cover</h2>
<div class="row">
  <div>
    <div class="label">MINISO (800x450)</div>
    <div class="card-img">
      <img src="uploads/images/case-miniso.gif" alt="">
      <div class="overlay"></div>
      <div class="txt"><h3>名创优品 · 年会AI开场视频</h3><div class="en">MINISO Annual Gala</div></div>
    </div>
  </div>
  <div>
    <div class="label">Peugeot (800x450)</div>
    <div class="card-img">
      <img src="uploads/images/case-peugeot.gif" alt="">
      <div class="overlay"></div>
      <div class="txt"><h3>东风标致 · AI传播视频</h3><div class="en">Peugeot AI Brand Film</div></div>
    </div>
  </div>
</div>
</body>
</html>
